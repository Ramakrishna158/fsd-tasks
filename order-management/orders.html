<!DOCTYPE html>
<html>
<head>
    <title>Order Management Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8; 
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        .card {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h1>Customer Order History</h1>

<table>
    <tr>
        <th>Customer</th>
        <th>Product</th>
        <th>Quantity</th>
        <th>Total Amount</th>
        <th>Date</th>
    </tr>
    <tr>
        <td>Arun</td>
        <td>Laptop</td>
        <td>1</td>
        <td>60000</td>
        <td>2024-01-10</td>
    </tr>
    <tr>
        <td>Bhavya</td>
        <td>Mobile</td>
        <td>1</td>
        <td>20000</td>
        <td>2024-02-18</td>
    </tr>
</table>

<div class="card">
    <h3>Highest Value Order</h3>
    <p>Arun - ₹60000</p>
</div>

<div class="card">
    <h3>Most Active Customer</h3>
    <p>Arun (2 Orders)</p>
</div>

</body>
</html>
