<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Feedback Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            background: white;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Hover Effects */
        input:hover, textarea:hover, select:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        /* Real-time Validation States */
        .input-valid {
            border-color: #10b981 !important;
            background: #f0fdf4 !important;
        }

        .input-invalid {
            border-color: #ef4444 !important;
            background: #fef2f2 !important;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .rating-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .rating-btn {
            width: 50px;
            height: 50px;
            border: 2px solid #e1e5e9;
            border-radius: 50%;
            background: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rating-btn:hover {
            transform: scale(1.1);
            border-color: #667eea;
        }

        .rating-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* Confirmation Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translate(-50%, -60%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .close-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }

        .feedback-stats {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            text-align: center;
        }

        .stats-count {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗣️ Customer Feedback</h1>
        
        <form id="feedbackForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required>
                <div class="error-message" id="nameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="rating">Your Rating *</label>
                <div class="rating-group">
                    <button type="button" class="rating-btn" data-rating="1">😡</button>
                    <button type="button" class="rating-btn" data-rating="2">🙁</button>
                    <button type="button" class="rating-btn" data-rating="3">😐</button>
                    <button type="button" class="rating-btn" data-rating="4">🙂</button>
                    <button type="button" class="rating-btn" data-rating="5" class="active">😊</button>
                </div>
                <div class="error-message" id="ratingError">Please select a rating</div>
            </div>

            <div class="form-group">
                <label for="feedback">Your Feedback *</label>
                <textarea id="feedback" name="feedback" rows="5" placeholder="Tell us about your experience..." required></textarea>
                <div class="error-message" id="feedbackError"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Submit Feedback (Double-click to confirm)
            </button>
        </form>

        <div class="feedback-stats" id="stats" style="display: none;">
            <h3>Total Feedbacks: <span class="stats-count" id="totalFeedbacks">0</span></h3>
            <p>💾 Stored locally (adaptable to MongoDB)</p>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h2>✅ Thank You!</h2>
            <p id="modalMessage">Your feedback has been recorded successfully!</p>
            <button class="close-btn" onclick="closeModal()">New Feedback</button>
        </div>
    </div>

    <script>
        // Reusable validation functions
        const validators = {
            name: (value) => value.trim().length >= 2,
            email: (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim()),
            feedback: (value) => value.trim().length >= 10,
            rating: () => document.querySelector('.rating-btn.active')
        };

        // DOM elements
        const form = document.getElementById('feedbackForm');
        const modal = document.getElementById('confirmModal');
        const submitBtn = document.getElementById('submitBtn');

        // Real-time validation on keypress
        ['name', 'email', 'feedback'].forEach(fieldId => {
            const field = document.getElementById(fieldId);
            const errorEl = document.getElementById(fieldId + 'Error');
            
            field.addEventListener('keypress', debounce(() => validateField(fieldId, errorEl), 300));
            field.addEventListener('input', debounce(() => validateField(fieldId, errorEl), 300));
        });

        // Rating selection
        document.querySelectorAll('.rating-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                validateField('rating', document.getElementById('ratingError'));
            });
        });

        // Double-click submit
        submitBtn.addEventListener('dblclick', handleDoubleClickSubmit);

        // Load existing feedback stats
        loadFeedbackStats();

        // Validation function
        function validateField(fieldId, errorEl) {
            const field = document.getElementById(fieldId);
            const isValid = validators[fieldId](field.value);
            
            field.classList.toggle('input-valid', isValid);
            field.classList.toggle('input-invalid', !isValid);
            errorEl.classList.toggle('show', !isValid);
            
            if (isValid) errorEl.textContent = '';
            else errorEl.textContent = getErrorMessage(fieldId);
        }

        function getErrorMessage(fieldId) {
            const messages = {
                name: 'Name must be at least 2 characters',
                email: 'Please enter a valid email',
                feedback: 'Feedback must be at least 10 characters',
                rating: 'Please select a rating'
            };
            return messages[fieldId];
        }

        // Debounce utility for real-time validation
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Double-click submit handler
        async function handleDoubleClickSubmit(e) {
            e.preventDefault();
            
            if (!form.checkValidity() || !validators.rating()) {
                alert('Please fill all required fields correctly');
                return;
            }

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                rating: document.querySelector('.rating-btn.active').dataset.rating,
                feedback: document.getElementById('feedback').value,
                timestamp: new Date().toISOString()
            };

            // Store feedback (localStorage demo - replace with MongoDB API)
            storeFeedback(formData);
            
            showConfirmation(formData);
            form.reset();
            resetFormStyles();
            loadFeedbackStats();
        }

        // Store feedback function (adapt for MongoDB)
        function storeFeedback(data) {
            let feedbacks = JSON.parse(localStorage.getItem('feedbacks') || '[]');
            feedbacks.push(data);
            localStorage.setItem('feedbacks', JSON.stringify(feedbacks));
        }

        // Load feedback stats
        function loadFeedbackStats() {
            const feedbacks = JSON.parse(localStorage.getItem('feedbacks') || '[]');
            const statsEl = document.getElementById('stats');
            const countEl = document.getElementById('totalFeedbacks');
            
            countEl.textContent = feedbacks.length;
            statsEl.style.display = feedbacks.length > 0 ? 'block' : 'none';
        }

        // Show confirmation modal
        function showConfirmation(data) {
            document.getElementById('modalMessage').textContent = 
                `Thank you ${data.name}! Your ${getRatingEmoji(data.rating)} rating and feedback has been recorded.`;
            modal.style.display = 'block';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Reset form visual states
        function resetFormStyles() {
            document.querySelectorAll('input, textarea, select').forEach(field => {
                field.classList.remove('input-valid', 'input-invalid');
            });
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
            });
        }

        function getRatingEmoji(rating) {
            const emojis = {1: '😡', 2: '🙁', 3: '😐', 4: '🙂', 5: '😊'};
            return emojis[rating];
        }

        // Close modal on outside click
        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });
    </script>
</body>
</html>
